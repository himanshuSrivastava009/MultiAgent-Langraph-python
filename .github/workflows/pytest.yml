name: Pytest

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pytest-gorest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GOREST_BASE_URL: https://gorest.co.in/public/v2
      GOREST_API_TOKEN: ${{ secrets.GOREST_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check required secrets
        run: |
          if [ -z "$GOREST_API_TOKEN" ]; then
            echo "GOREST_API_TOKEN secret is missing."
            echo "Add it in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

      - name: Run tests
        run: pytest tests -q
